- name: Deploy DO to BIGIP
  uri:
    url: "https://{{ hostvars[inventory_hostname].ansible_host }}/mgmt/shared/declarative-onboarding?async=true"
    method: POST
    user: "{{ admin_user }}"
    password: "{{ admin_password }}"
    validate_certs: no
    body: "{{ lookup('file', '{{ backup_dir }}/json/{{ inventory_hostname }}_do.json') }}"
    body_format: json
    status_code: [200, 202]
  register: result
  no_log: false
  
- name: Wait for task completion
  uri:
    url: "https://{{ hostvars[inventory_hostname].ansible_host }}/mgmt/shared/declarative-onboarding/"
    status_code: [200, 202]
    user: "{{ admin_user }}"
    password: "{{ admin_password }}"
    validate_certs: no
  register: response
  no_log: false
  until: response.json.result.message != "processing"
  retries: 10
  delay: 10
  
- name: Print result
  debug:
    var: response.json.result.message
  # 422 is invalid configuration
  failed_when: response.status == 422 or (response.json.result.message != "success" and response.json.result.message != "no change")
  changed_when: response.json.result.message == "success"