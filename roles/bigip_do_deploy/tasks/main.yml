---
- name: Require generated DO JSON
  stat:
    path: "{{ do_backup_dir }}/json/{{ inventory_hostname }}.json"
  register: do_declaration_file

- name: Stop when DO declaration has not been generated
  assert:
    that:
      - do_declaration_file.stat.exists
    fail_msg: "Run ansible-playbook gen_do.yml before deploying DO."

- name: Deploy DO declaration to BIG-IP
  uri:
    url: "https://{{ ansible_host }}:{{ bigip_mgmt_port }}/mgmt/shared/declarative-onboarding"
    method: POST
    user: "{{ admin_user }}"
    password: "{{ admin_password }}"
    validate_certs: "{{ bigip_validate_certs }}"
    body: "{{ lookup('file', do_backup_dir ~ '/json/' ~ inventory_hostname ~ '.json') }}"
    body_format: json
    status_code: [200, 202]
  register: do_submit
  no_log: "{{ bigip_hide_sensitive_logs | default(true) }}"

- name: Wait for DO task completion
  uri:
    url: "https://{{ ansible_host }}:{{ bigip_mgmt_port }}/mgmt/shared/declarative-onboarding/task/{{ do_submit.json.id }}"
    method: GET
    user: "{{ admin_user }}"
    password: "{{ admin_password }}"
    validate_certs: "{{ bigip_validate_certs }}"
    status_code: 200
  register: do_response
  no_log: "{{ bigip_hide_sensitive_logs | default(true) }}"
  until: do_response.json.result.status is defined and do_response.json.result.status != "RUNNING"
  retries: "{{ do_task_retries | default(30) }}"
  delay: "{{ do_task_delay | default(10) }}"
  when: do_submit.json.id is defined
  failed_when: >
    do_response.json.result.code is defined and
    (do_response.json.result.code | int) >= 400

- name: Print DO result
  debug:
    msg:
      device: "{{ inventory_hostname }}"
      task_id: "{{ do_submit.json.id | default('inline') }}"
      status: "{{ do_response.json.result.status | default(do_submit.json.result.status | default('unknown')) }}"
      message: "{{ do_response.json.result.message | default(do_submit.json.result.message | default('')) }}"
