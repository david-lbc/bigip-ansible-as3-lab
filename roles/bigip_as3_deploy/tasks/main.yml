---
- name: Deploy AS3 to BIGIP
  uri:
    url: >-
      https://{{ ansible_host }}:{{ bigip_mgmt_port }}/mgmt/shared/appsvcs/declare?async=true
    method: POST
    user: "{{ admin_user }}"
    password: "{{ admin_password }}"
    validate_certs: "{{ bigip_validate_certs }}"
    body: "{{ lookup('file', backup_dir ~ '/json/' ~ inventory_hostname ~ '.json') }}"
    body_format: json
    status_code: [200, 202]
  register: result
  no_log: "{{ bigip_hide_sensitive_logs | default(true) }}"

- name: Wait for task completion
  uri:
    url: >-
      https://{{ ansible_host }}:{{ bigip_mgmt_port }}/mgmt/shared/appsvcs/task/{{ result.json.id }}
    status_code: 200
    user: "{{ admin_user }}"
    password: "{{ admin_password }}"
    validate_certs: "{{ bigip_validate_certs }}"
  register: response
  no_log: "{{ bigip_hide_sensitive_logs | default(true) }}"
  until: >
    response.json.results |
    selectattr("message", "equalto", "in progress") |
    list |
    count < 1
  retries: 10
  delay: 10

- name: Print result
  debug:
    var: response.json.results
  # 422 is invalid configuration
  failed_when: >
    response.status == 422 or
    response.json.results |
    selectattr("message", "ne", "success") |
    selectattr("message", "ne", "no change") |
    list |
    count >= 1
  changed_when: >
    response.json.results |
    selectattr("message", "equalto", "success") |
    list |
    count >= 1
