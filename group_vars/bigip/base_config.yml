---
bigip_do:
  schemaVersion: "1.0.0"
  async: true
  label: BIG-IP self-service lab base configuration
  system:
    hostname: bigip1.lab.local
    cliInactivityTimeout: 1200
    consoleInactivityTimeout: 1200
    autoCheck: false
    autoPhonehome: false
  dns:
    nameServers:
      - 8.8.8.8
      - 1.1.1.1
    search:
      - lab.local
  ntp:
    servers:
      - 0.pool.ntp.org
      - 1.pool.ntp.org
    timezone: UTC
  provision:
    ltm: nominal
  vlans:
    - name: vlan1
      tag: 101
      mtu: 1500
      interfaces:
        - name: "1.1"
          tagged: true
    - name: vlan2
      tag: 102
      mtu: 1500
      interfaces:
        - name: "1.2"
          tagged: true
  self_ips:
    - name: vlan1-self
      address: 10.10.10.1/24
      vlan: vlan1
      allowService: default
      trafficGroup: traffic-group-local-only
    - name: vlan2-self
      address: 10.20.20.1/24
      vlan: vlan2
      allowService: none
      trafficGroup: traffic-group-local-only
  routes:
    - name: default
      gw: 10.20.20.254
      network: default
      mtu: 1500
