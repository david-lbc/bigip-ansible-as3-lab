---
- name: Deploy F5 OVA to ESXi with Multiple Networks and EULA Acceptance
  hosts: localhost
  gather_facts: no
  vars:
    esxi_hostname: "192.168.86.51"
    esxi_username: "root"
    esxi_password: "1Pringles!"
    datastore: "ssd"  # Specify the datastore on the ESXi host where the VM will be stored
    ova_path: "http://192.168.86.1/srv/nfs3/iso/BIGIP-17.1.1.4-0.0.9.ALL-vmware.ova"
    vm_name: "BIGIP-LAB-02"
    mgmt_ip: "192.168.86.60"  # Replace with the desired management IP address
    mgmt_netmask: "255.255.255.0"  # Replace with the desired netmask
    mgmt_gateway: "192.168.86.1"  # Replace with the desired gateway
    vm_networks:
      network1: "VM Network"
      network2: "vlan101"
      network3: "vlan102"

  tasks:
    - name: Deploy OVA file to ESXi with Multiple Networks and EULA Acceptance
      community.vmware.vmware_deploy_ovf:
        hostname: "{{ esxi_hostname }}"
        username: "{{ esxi_username }}"
        password: "{{ esxi_password }}"
        validate_certs: no
        url: "{{ ova_path }}"
        name: "{{ vm_name }}"
        datastore: "{{ datastore }}"
        networks: "{{ vm_networks }}"
        wait_for_ip_address: no
        accept_all_eula: true  # Automatically accepts the EULA
        properties:  # OVF properties for management configuration
          mgmt-ip: "{{ mgmt_ip }}"
          mgmt-netmask: "{{ mgmt_netmask }}"
          mgmt-gateway: "{{ mgmt_gateway }}"
      delegate_to: localhost

    - name: Verify VM Deployment
      community.vmware.vmware_guest_info:
        hostname: "{{ esxi_hostname }}"
        username: "{{ esxi_username }}"
        password: "{{ esxi_password }}"
        validate_certs: no
        name: "{{ vm_name }}"
      register: vm_info
      delegate_to: localhost

    - name: Debug VM Information
      debug:
        msg: "VM Deployment Successful. VM Info: {{ vm_info }}"

    - name: Power on the VM
      community.vmware.vmware_guest_powerstate:
        hostname: "{{ esxi_hostname }}"
        username: "{{ esxi_username }}"
        password: "{{ esxi_password }}"
        validate_certs: no
        name: "{{ vm_name }}"
        state: poweredon
      delegate_to: localhost

